          description: True when at least one source block is enabled.
        entries:
          type: array
          description: Unique CIDR entries aggregated from all source blocks.
          items:
            type: string
        geoip:
          type: array
          description: Unique GeoIP tags aggregated from all source blocks.
          items:
            type: string
        blocks:
          type: array
          description: Parsed HR Neo source blocks in file order.
          items:
            $ref: "#/components/schemas/CIDRBlock"

