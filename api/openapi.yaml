          type: string
        enabled:
          type: boolean
          description: True when at least one source group is enabled.
        domains:
          type: array
          description: Unique domains aggregated from all source groups.
          items:
            type: string
        geosite:
          type: array
          description: Unique GeoSite tags aggregated from all source groups.
          items:
            type: string
        groups:
          type: array
          description: Parsed HR Neo source groups in file order.
          items:
            $ref: "#/components/schemas/DomainTarget"

